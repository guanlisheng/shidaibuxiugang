---
layout: default
title: 行业资讯
---

<div class="max-w-3xl mx-auto px-4 py-12">

  <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold mb-4">
    行业资讯
  </h1>

  <div class="w-20 h-1 bg-primary mb-8 rounded-full"></div>

  <div class="space-y-6">
    {% for post in site.posts %}
      <div class="border-b pb-4">
        <h2 class="text-xl font-semibold">
          <a href="{{ post.url }}" class="text-green-600 hover:underline">
            {{ post.title }}
          </a>
        </h2>

        <p class="text-sm text-gray-500">
          {{ post.date | date: "%Y-%m-%d" }} · {{ post.category }}
        </p>

        <p class="mt-2 text-gray-700">
          {{ post.description }}
        </p>
      </div>
    {% endfor %}
  </div>

</div>
