---
layout: default
title: 产品视频展示
---

<section class="py-20 bg-gray-50">
  <div class="container mx-auto px-4">

    <h1 class="text-3xl font-bold text-center mb-10">产品视频展示</h1>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">

      {% for v in site.data.videos %}
      <div class="bg-white rounded-xl shadow-md overflow-hidden">

        <video 
          class="w-full object-cover"
          src="{{ '/assets/videos/' | append: v.file | relative_url }}"
          controls>
        </video>

        <div class="p-4">
          <h3 class="font-bold text-lg mb-2">{{ v.title }}</h3>
          <p class="text-gray-600 text-sm">{{ v.desc }}</p>
        </div>

      </div>
      {% endfor %}

    </div>

  </div>
</section>
