<header id="navbar" class="fixed w-full top-0 z-50 bg-white/95 shadow-md transition-all duration-300">

  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- LOGO -->
      <a href="{{ '/' | relative_url }}" class="flex items-center">
        <h1 class="text-xl md:text-2xl font-bold text-primary">
          赵中伍不锈钢制品
        </h1>
      </a>

      <!-- PC导航 -->
      <nav class="hidden md:flex space-x-6 text-sm md:text-base">
        <a href="{{ '/' | relative_url }}#home" class="hover:text-primary">首页</a>
        <a href="{{ '/' | relative_url }}#about" class="hover:text-primary">关于</a>
        <a href="{{ '/' | relative_url }}#products" class="hover:text-primary">产品</a>
        <a href="{{ '/' | relative_url }}#videos" class="hover:text-primary">视频</a>
        <a href="{{ '/news/' | relative_url }}" class="hover:text-primary">资讯</a>
        <a href="{{ '/' | relative_url }}#factory" class="hover:text-primary">实力</a>
        <a href="{{ '/' | relative_url }}#service" class="hover:text-primary">范围</a>
        <a href="{{ '/' | relative_url }}#contact" class="hover:text-primary">联系</a>
      </nav>

      <!-- 移动端按钮 -->
      <button id="menuBtn" class="md:hidden text-gray-700 focus:outline-none">
        <i class="fas fa-bars text-2xl"></i>
      </button>

    </div>
  </div>

  <!-- 移动端菜单 -->
  <div id="mobileMenu" class="md:hidden hidden bg-white border-t border-gray-200">
    <div class="px-4 py-3 flex flex-col space-y-3">
      <a href="#home" class="py-2">首页</a>
      <a href="#about" class="py-2">关于</a>
      <a href="#products" class="py-2">产品</a>
      <a href="#videos" class="py-2">视频</a>
      <a href="{{ '/news/' | relative_url }}" class="py-2">资讯</a>
      <a href="#factory" class="py-2">实力</a>
      <a href="#service" class="py-2">范围</a>
      <a href="#contact" class="py-2">联系</a>
    </div>
  </div>

</header>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  const navbar = document.getElementById('navbar');

  if (!menuBtn) return;

  // 菜单切换
  menuBtn.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
    menuBtn.innerHTML = mobileMenu.classList.contains('hidden')
      ? '<i class="fas fa-bars text-2xl"></i>'
      : '<i class="fas fa-times text-2xl"></i>';
  });

  // 滚动效果
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      navbar.classList.add('shadow-lg');
    } else {
      navbar.classList.remove('shadow-lg');
    }
  });

  // 点击关闭
  mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.classList.add('hidden');
      menuBtn.innerHTML = '<i class="fas fa-bars text-2xl"></i>';
    });
  });

});
</script>
